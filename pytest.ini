# =============================================================================
# Pytest Configuration - Vision Computer Project
# =============================================================================

[pytest]
# Diretórios de teste
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções de execução
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --cov=src
    --cov-report=term-missing:skip-covered

# Marks
markers =
    unit: Testes unitários
    integration: Testes de integração
    gpu: Testes que requerem GPU
    slow: Testes lentos
    ethics: Testes relacionados à ética
    gan: Testes relacionados ao GAN simulator

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Timeout (em segundos)
timeout = 300

# Cache
cache_dir = .pytest_cache